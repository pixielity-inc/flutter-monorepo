<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#0D1B2A"/>
    </linearGradient>
    <linearGradient id="topLine" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#54C5F8" stop-opacity="0"/>
      <stop offset="30%" stop-color="#54C5F8"/>
      <stop offset="70%" stop-color="#29B6F6"/>
      <stop offset="100%" stop-color="#29B6F6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="divLine" x1="0" y1="0" x2="0" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#54C5F8" stop-opacity="0"/>
      <stop offset="40%" stop-color="#54C5F8" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#54C5F8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#54C5F8" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clip"><rect width="1200" height="360" rx="14"/></clipPath>
  </defs>

  <g clip-path="url(#clip)">
    <rect width="1200" height="360" fill="url(#bg)"/>

    <!-- dot grid -->
    <pattern id="dots" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="0.8" fill="#30363D"/>
    </pattern>
    <rect width="1200" height="360" fill="url(#dots)"/>

    <!-- top accent -->
    <rect x="0" y="0" width="1200" height="2.5" fill="url(#topLine)"/>

    <!-- ═══════════════ LEFT PANEL (0–660) ═══════════════ -->

    <!-- Flutter logo — official diamond/chevron shape -->
    <g transform="translate(56, 108)">
      <!-- top parallelogram -->
      <polygon points="0,0 88,0 62,26 0,26" fill="#54C5F8"/>
      <!-- middle parallelogram -->
      <polygon points="0,38 62,38 88,64 0,64" fill="#54C5F8"/>
      <!-- bottom chevron left -->
      <polygon points="0,64 62,64 36,90 0,90" fill="#01579B"/>
      <!-- bottom chevron right highlight -->
      <polygon points="62,64 88,64 62,90 36,90" fill="#29B6F6"/>
    </g>

    <!-- Title — x=188 keeps clear of logo (logo ends ~144) -->
    <text x="188" y="152"
      font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif"
      font-size="44" font-weight="700" fill="#E6EDF3" letter-spacing="-0.5">Flutter Monorepo</text>

    <!-- Subtitle line 1 -->
    <text x="188" y="190"
      font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif"
      font-size="15.5" fill="#8B949E">
      Production-ready Flutter monorepo template
    </text>

    <!-- Subtitle line 2 -->
    <text x="188" y="212"
      font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif"
      font-size="15.5" fill="#8B949E">
      Melos 7 · Dart CLI · Clean Architecture · Riverpod
    </text>

    <!-- Badges — row 1: Flutter, Dart, Melos (3 badges × 90px + 10px gap = 290px, starts at x=188, ends at 478) -->
    <g transform="translate(188, 232)">
      <rect x="0"   y="0" width="86" height="26" rx="5" fill="#54C5F8" fill-opacity="0.1" stroke="#54C5F8" stroke-width="0.8" stroke-opacity="0.6"/>
      <text x="43"  y="17.5" font-family="system-ui,sans-serif" font-size="11.5" font-weight="600" fill="#54C5F8" text-anchor="middle">Flutter 3.x</text>

      <rect x="96"  y="0" width="76" height="26" rx="5" fill="#00BCD4" fill-opacity="0.1" stroke="#00BCD4" stroke-width="0.8" stroke-opacity="0.6"/>
      <text x="134" y="17.5" font-family="system-ui,sans-serif" font-size="11.5" font-weight="600" fill="#00BCD4" text-anchor="middle">Dart 3.x</text>

      <rect x="182" y="0" width="76" height="26" rx="5" fill="#A78BFA" fill-opacity="0.1" stroke="#A78BFA" stroke-width="0.8" stroke-opacity="0.6"/>
      <text x="220" y="17.5" font-family="system-ui,sans-serif" font-size="11.5" font-weight="600" fill="#A78BFA" text-anchor="middle">Melos 7</text>

      <rect x="268" y="0" width="84" height="26" rx="5" fill="#34D399" fill-opacity="0.1" stroke="#34D399" stroke-width="0.8" stroke-opacity="0.6"/>
      <text x="310" y="17.5" font-family="system-ui,sans-serif" font-size="11.5" font-weight="600" fill="#34D399" text-anchor="middle">Riverpod</text>
    </g>

    <!-- Badges — row 2: VGA alone on its own line -->
    <g transform="translate(188, 268)">
      <rect x="0"   y="0" width="140" height="26" rx="5" fill="#FCD34D" fill-opacity="0.1" stroke="#FCD34D" stroke-width="0.8" stroke-opacity="0.6"/>
      <text x="70"  y="17.5" font-family="system-ui,sans-serif" font-size="11.5" font-weight="600" fill="#FCD34D" text-anchor="middle">very_good_analysis</text>
    </g>

    <!-- divider -->
    <rect x="640" y="0" width="1" height="360" fill="url(#divLine)"/>

    <!-- ═══════════════ RIGHT PANEL (660–1200) ═══════════════ -->

    <text x="672" y="72"
      font-family="system-ui,sans-serif" font-size="10.5" font-weight="700"
      fill="#484F58" letter-spacing="2.5">FEATURES</text>

    <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif"
       font-size="14" fill="#C9D1D9">
      <text x="672" y="108"><tspan fill="#54C5F8">›</tspan><tspan dx="10">Clean Architecture — Domain / Data / Feature</tspan></text>
      <text x="672" y="144"><tspan fill="#54C5F8">›</tspan><tspan dx="10">Dart CLI — lint, test, build, gen, publish</tspan></text>
      <text x="672" y="180"><tspan fill="#54C5F8">›</tspan><tspan dx="10">GitHub Actions — CI, CD build, CD publish</tspan></text>
      <text x="672" y="216"><tspan fill="#54C5F8">›</tspan><tspan dx="10">Git hooks — format + analyze on commit</tspan></text>
      <text x="672" y="252"><tspan fill="#54C5F8">›</tspan><tspan dx="10">Kiro MCP — Dart SDK + HeroUI Native</tspan></text>
      <text x="672" y="288"><tspan fill="#54C5F8">›</tspan><tspan dx="10">Dependabot · CODEOWNERS · PR templates</tspan></text>
    </g>

    <!-- bottom bar -->
    <rect x="0" y="328" width="1200" height="32" fill="#010409" fill-opacity="0.7"/>
    <text x="56" y="349" font-family="system-ui,sans-serif" font-size="11.5" fill="#484F58">github.com/pixielity-inc/flutter-monorepo</text>
    <text x="1144" y="349" font-family="system-ui,sans-serif" font-size="11.5" fill="#484F58" text-anchor="end">MIT License</text>
  </g>
</svg>
