name: pixielity_container
description: >
  Laravel-style IoC container for the Pixielity Flutter monorepo.
  Wraps get_it with bind(), singleton(), instance(), alias(), and make()
  so the DI layer reads the same way as a Laravel service container.
version: 0.1.0
publish_to: none

resolution: workspace

environment:
  sdk: ">=3.11.0 <4.0.0"
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter
  # get_it is the underlying service locator that powers the container.
  get_it: ^8.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^6.0.0
