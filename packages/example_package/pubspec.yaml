# packages/example_package/pubspec.yaml
#
# Example Package — canonical template for all domain-layer packages.
#
# This package demonstrates the Domain Layer pattern:
#   - Pure Dart (no Flutter dependency)
#   - Entities, repository interfaces, and use cases only
#   - No HTTP, no UI, no state management
#
# Other packages depend on this; it depends on nothing in the monorepo.

name: pixielity_core
description: >
  Canonical example of a domain-layer package in the Flutter monorepo.
  Contains a model, repository interface, and use case as templates.
version: 0.1.0
publish_to: none

# Tells the Dart SDK this package is part of the root workspace.
resolution: workspace

environment:
  sdk: ">=3.11.0 <4.0.0"

dependencies:
  # freezed_annotation provides the @freezed macro used by the model.
  freezed_annotation: ^2.4.1

  # json_annotation provides @JsonSerializable used for JSON mapping.
  json_annotation: ^4.8.1

dev_dependencies:
  # build_runner drives code generation for freezed and json_serializable.
  build_runner: ^2.4.8

  # flutter_test provides the test framework.
  flutter_test:
    sdk: flutter

  # freezed generates immutable model boilerplate.
  freezed: ^2.4.7

  # json_serializable generates fromJson/toJson methods.
  json_serializable: ^6.7.1

  # very_good_analysis enforces strict lint rules.
  very_good_analysis: ^6.0.0
