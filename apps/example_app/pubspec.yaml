# apps/example_app/pubspec.yaml
#
# Example App — the composition root of the Flutter monorepo.
#
# This app wires together packages from the monorepo and demonstrates
# the full stack: domain entity → use case → Riverpod provider → UI.
#
# It is intentionally minimal — one screen, one provider, one package dep.
# Use it as the template when adding new apps to the monorepo.

name: pixielity_example_app
description: >
  Example Flutter application demonstrating monorepo package consumption,
  Riverpod state management, and clean architecture wiring.
version: 1.0.0+1
publish_to: none

# Tells the Dart SDK this package is part of the root workspace.
resolution: workspace

environment:
  sdk: ">=3.11.0 <4.0.0"
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter

  # flutter_riverpod provides the ProviderScope and consumer widgets.
  flutter_riverpod: ^2.4.10
  forui: ">=0.20.4 <0.22.0"
  pixielity_refine:
    path: ../../packages/refine

  # lucide_icons_flutter — full Lucide icon set (same icons as Forui, more coverage).
  lucide_icons_flutter: ^3.1.12

  # pixielity_config — centralised configuration system.
  config:
    path: ../../packages/config

  # pixielity_container — Laravel-style IoC container.
  container:
    path: ../../packages/container

  # core — domain entities, repository interface, use case.
  pixielity_core:
    path: ../../packages/support

  # pixielity_logger — structured logger.
  logger:
    path: ../../packages/logger

  # pixielity_ui — centralised theming system and component library.
  ui:
    path: ../../packages/ui
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  # very_good_analysis enforces strict lint rules.
  very_good_analysis: ^6.0.0

flutter:
  uses-material-design: true
